<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="wheat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Road winding through -->
  <path d="M 80 480 Q 256 320 256 256 Q 256 192 432 32"
        stroke="url(#road)" stroke-width="48" fill="none"
        stroke-linecap="round" opacity="0.9"/>
  <!-- Road dashes -->
  <path d="M 80 480 Q 256 320 256 256 Q 256 192 432 32"
        stroke="#1c1917" stroke-width="4" fill="none"
        stroke-linecap="round" stroke-dasharray="16 24"/>
  <!-- Wheat sheaf on right -->
  <g transform="translate(340 200)">
    <ellipse cx="0" cy="20" rx="6" ry="14" fill="url(#wheat)" transform="rotate(-20 0 20)"/>
    <ellipse cx="-12" cy="14" rx="5" ry="12" fill="url(#wheat)" transform="rotate(-35 -12 14)"/>
    <ellipse cx="12" cy="14" rx="5" ry="12" fill="url(#wheat)" transform="rotate(-5 12 14)"/>
    <ellipse cx="-18" cy="2" rx="4" ry="10" fill="url(#wheat)" transform="rotate(-50 -18 2)"/>
    <ellipse cx="18" cy="2" rx="4" ry="10" fill="url(#wheat)" transform="rotate(10 18 2)"/>
    <ellipse cx="-20" cy="-12" rx="4" ry="9" fill="url(#wheat)" transform="rotate(-60 -20 -12)"/>
    <ellipse cx="20" cy="-12" rx="4" ry="9" fill="url(#wheat)" transform="rotate(20 20 -12)"/>
    <line x1="0" y1="30" x2="-4" y2="100" stroke="url(#wheat)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="4" y2="100" stroke="url(#wheat)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Audio waveform hint at top -->
  <g transform="translate(160 80)" opacity="0.85">
    <rect x="0" y="-12" width="6" height="24" rx="2" fill="url(#wheat)"/>
    <rect x="12" y="-20" width="6" height="40" rx="2" fill="url(#wheat)"/>
    <rect x="24" y="-8" width="6" height="16" rx="2" fill="url(#wheat)"/>
    <rect x="36" y="-24" width="6" height="48" rx="2" fill="url(#wheat)"/>
    <rect x="48" y="-16" width="6" height="32" rx="2" fill="url(#wheat)"/>
    <rect x="60" y="-6" width="6" height="12" rx="2" fill="url(#wheat)"/>
  </g>
</svg>
